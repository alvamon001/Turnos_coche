<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turnos coche</title>

<style>
body { font-family: Arial; padding: 20px; background: #f5f5f5; }
.card { background: white; padding: 15px; margin-top: 10px; border-radius: 10px; }
button { padding: 12px; margin-top: 10px; width: 100%; font-size: 16px; }
.result { font-size: 22px; text-align: center; font-weight: bold; padding: 10px; }
</style>
</head>

<body>

<h2>🚗 Turnos coche</h2>

<div class="card">
<p><strong>Quién va hoy:</strong></p>
<label><input type="checkbox" value="Álvaro" checked> Álvaro</label><br>
<label><input type="checkbox" value="Jorge" checked> Jorge</label><br>
<label><input type="checkbox" value="Yaisa" checked> Yaisa</label><br>
<label><input type="checkbox" value="Fani" checked> Fani</label>
</div>

<div class="card">
<div id="resultado" class="result">Pulsa calcular</div>
<button onclick="calcular()">👉 Calcular quién conduce</button>
<button onclick="registrar()">Registrar conductor</button>
<button onclick="reiniciar()">Reiniciar datos</button>
</div>

<div class="card">
<h3>Resumen</h3>
<div id="resumen"></div>
</div>

<div class="card">
<h3>Histórico</h3>
<ul id="historial"></ul>
</div>

<script>

// 👇 PERSONAS
const PEOPLE = ["Álvaro", "Jorge", "Yaisa", "Fani"];

// 👇 FRASES RANDOM
const FRASES = [
  "Hoy te toca pringar 🚗💨",
  "No te escaquees, que te hemos pillado 😏",
  "Gasolina y al volante campeón ⛽",
  "Hoy invitas tú al viaje 😎",
  "A conducir, que ya te tocaba 😂",
  "El destino ha hablado… y te ha jodido 🤣",
  "No mires atrás, conduce 🔥",
  "Te ha tocado por listo 😜",
  "Hoy eres el Uber oficial 🚕",
  "Mala suerte amigo… volante para ti 😬"
];

const STORAGE = "turnos_coche_v1";

let propuesta = null;

// 📦 CARGAR DATOS
function cargar() {
  let data = localStorage.getItem(STORAGE);
  if (!data) return crearBase();
  return JSON.parse(data);
}

// 🆕 CREAR BASE
function crearBase() {
  let obj = { people:{}, history:[] };
  PEOPLE.forEach(p => obj.people[p] = { participa:0, conduce:0 });
  return obj;
}

let state = cargar();

// 💾 GUARDAR
function guardar() {
  localStorage.setItem(STORAGE, JSON.stringify(state));
}

// 👥 QUIÉN VA HOY
function seleccionados() {
  return Array.from(document.querySelectorAll("input:checked")).map(e => e.value);
}

// 📊 RATIO
function ratio(p) {
  let d = state.people[p];
  if (d.participa === 0) return 0;
  return d.conduce / d.participa;
}

// 🚗 CALCULAR
function calcular() {
  let hoy = seleccionados();
  if (hoy.length === 0) return;

  let lista = hoy.map(p => ({
    nombre: p,
    r: ratio(p),
    c: state.people[p].conduce,
    pa: state.people[p].participa
  }));

  lista.sort((a,b)=>{
    if (a.r !== b.r) return a.r - b.r;
    if (a.c !== b.c) return a.c - b.c;
    if (a.pa !== b.pa) return a.pa - b.pa;
    return a.nombre.localeCompare(b.nombre);
  });

  propuesta = {
    conductor: lista[0].nombre,
    asistentes: hoy
  };

  let frase = FRASES[Math.floor(Math.random()*FRASES.length)];

  document.getElementById("resultado").innerText =
    propuesta.conductor + " 😏\n" + frase;
}

// ✅ REGISTRAR
function registrar() {
  if (!propuesta) return;

  propuesta.asistentes.forEach(p => state.people[p].participa++);
  state.people[propuesta.conductor].conduce++;

  let fecha = new Date().toLocaleDateString();
  state.history.push({
    fecha,
    conductor: propuesta.conductor,
    asistentes: propuesta.asistentes
  });

  guardar();
  render();

  document.getElementById("resultado").innerText =
    "Registrado: " + propuesta.conductor;

  propuesta = null;
}

// 🔄 REINICIAR
function reiniciar() {
  if (!confirm("¿Seguro?")) return;
  state = crearBase();
  guardar();
  render();
}

// 📊 RENDER
function render() {
  let resumen = document.getElementById("resumen");
  let historial = document.getElementById("historial");

  resumen.innerHTML = "";
  historial.innerHTML = "";

  PEOPLE.forEach(p => {
    let d = state.people[p];
    resumen.innerHTML += `
      <p>${p}: conduce ${d.conduce} / participa ${d.participa}</p>
    `;
  });

  state.history.slice().reverse().forEach(h => {
    historial.innerHTML += `
      <li>${h.fecha} - ${h.conductor} condujo (${h.asistentes.join(", ")})</li>
    `;
  });
}

// INIT
render();

</script>

</body>
</html>
